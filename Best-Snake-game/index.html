<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Snake Pro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #0a0a0f;
      font-family: 'Courier New', monospace;
      color: #e0e0e0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    .wrapper {
      width: 100%;
      max-width: 520px;
      padding: 14px 12px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    /* HEADER */
    .header {
      text-align: center;
    }

    h1 {
      font-size: clamp(18px, 5vw, 26px);
      font-weight: 700;
      letter-spacing: 6px;
      color: #00ff88;
      text-shadow: 0 0 20px #00ff8844;
    }

    .subtitle {
      font-size: clamp(8px, 2vw, 10px);
      letter-spacing: 3px;
      color: #444;
    }

    /* STATS */
    .stats-bar {
      display: flex;
      gap: clamp(12px, 4vw, 28px);
      background: #111118;
      border: 1px solid #1e1e2e;
      border-radius: 10px;
      padding: 8px clamp(12px, 4vw, 22px);
      width: 100%;
      justify-content: center;
    }

    .stat {
      text-align: center;
    }

    .stat-label {
      font-size: clamp(8px, 2vw, 10px);
      letter-spacing: 2px;
      color: #444;
    }

    .stat-value {
      font-size: clamp(16px, 5vw, 22px);
      font-weight: 700;
      color: #00ff88;
    }

    #hi-score .stat-value {
      color: #ffaa00;
    }

    /* CANVAS */
    #canvas-wrap {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    canvas {
      display: block;
      border: 1px solid #1a1a2e;
      border-radius: 6px;
      image-rendering: pixelated;
      max-width: 100%;
    }

    /* OVERLAY */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 15, 0.93);
      border-radius: 6px;
      gap: 6px;
    }

    #overlay h2 {
      font-size: clamp(16px, 5vw, 22px);
      letter-spacing: 4px;
      color: #00ff88;
    }

    #overlay p {
      font-size: clamp(9px, 2.5vw, 12px);
      color: #555;
      letter-spacing: 2px;
      text-align: center;
      padding: 0 12px;
    }

    .dead-msg {
      color: #ff4466;
      font-size: clamp(11px, 3vw, 14px);
      letter-spacing: 2px;
    }

    .score-pop {
      color: #ffaa00;
      font-size: clamp(9px, 2.5vw, 12px);
      letter-spacing: 1px;
    }

    .btn-start {
      background: transparent;
      border: 1px solid #00ff88;
      color: #00ff88;
      padding: clamp(8px, 2vw, 11px) clamp(20px, 5vw, 30px);
      font-family: 'Courier New', monospace;
      font-size: clamp(11px, 3vw, 14px);
      letter-spacing: 3px;
      cursor: pointer;
      border-radius: 6px;
      margin-top: 6px;
      transition: background 0.2s;
    }

    .btn-start:hover {
      background: #00ff8822;
    }

    /* CONTROLS ROW — speed + pause always visible */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      flex-wrap: wrap;
    }

    .ctrl-label {
      font-size: clamp(8px, 2vw, 10px);
      letter-spacing: 2px;
      color: #444;
      white-space: nowrap;
    }

    .speed-btns {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .spd {
      background: #111118;
      border: 1px solid #222;
      color: #555;
      padding: clamp(5px, 1.5vw, 7px) clamp(9px, 3vw, 14px);
      font-family: 'Courier New', monospace;
      font-size: clamp(9px, 2.5vw, 11px);
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 5px;
      transition: all 0.18s;
      touch-action: manipulation;
    }

    .spd.active {
      border-color: #00ff88;
      color: #00ff88;
      background: #00ff8814;
    }

    .spd:hover:not(.active) {
      border-color: #333;
      color: #777;
    }

    #pause-btn {
      background: transparent;
      border: 1px solid #2a2a3a;
      color: #555;
      padding: clamp(5px, 1.5vw, 7px) clamp(10px, 3vw, 16px);
      font-family: 'Courier New', monospace;
      font-size: clamp(9px, 2.5vw, 11px);
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 5px;
      transition: all 0.18s;
      touch-action: manipulation;
      white-space: nowrap;
    }

    #pause-btn:hover {
      border-color: #444;
      color: #777;
    }

    #pause-btn.paused {
      border-color: #ffaa00;
      color: #ffaa00;
    }

    /* D-PAD */
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 5px;
      width: clamp(140px, 40vw, 180px);
      height: clamp(140px, 40vw, 180px);
    }

    .dpad-btn {
      background: #111118;
      border: 1px solid #1e1e2e;
      border-radius: 9px;
      color: #00ff88;
      font-size: clamp(16px, 5vw, 22px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.1s, transform 0.08s;
      touch-action: manipulation;
    }

    .dpad-btn:active {
      background: #00ff8820;
      transform: scale(0.91);
    }

    .dpad-blank {
      visibility: hidden;
    }

    .kbd-hint {
      font-size: clamp(8px, 2vw, 10px);
      color: #252535;
      letter-spacing: 1px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="wrapper">

    <div class="header">
      <h1>SNAKE</h1>
      <div class="subtitle">PROFESSIONAL EDITION</div>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-label">SCORE</div>
        <div class="stat-value" id="score-val">0</div>
      </div>
      <div class="stat" id="hi-score">
        <div class="stat-label">BEST</div>
        <div class="stat-value" id="hi-val">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">LENGTH</div>
        <div class="stat-value" id="len-val">1</div>
      </div>
      <div class="stat">
        <div class="stat-label">LEVEL</div>
        <div class="stat-value" id="lvl-val">1</div>
      </div>
    </div>

    <div id="canvas-wrap">
      <canvas id="c"></canvas>
      <div id="overlay">
        <h2>SNAKE</h2>
        <p>ARROWS / WASD / D-PAD<br>OR SWIPE ON SCREEN</p>
        <button class="btn-start" id="start-btn">▶ START GAME</button>
      </div>
    </div>

    <!-- Speed + Pause always visible -->
    <div class="controls">
      <span class="ctrl-label">SPEED</span>
      <div class="speed-btns">
        <button class="spd" data-spd="1">SLOW</button>
        <button class="spd active" data-spd="2">MEDIUM</button>
        <button class="spd" data-spd="3">FAST</button>
        <button class="spd" data-spd="4">😈 INSANE</button>
      </div>
      <button id="pause-btn">⏸ PAUSE</button>
    </div>

    <!-- D-Pad -->
    <div class="dpad">
      <div class="dpad-blank"></div>
      <button class="dpad-btn" id="btn-up">▲</button>
      <div class="dpad-blank"></div>
      <button class="dpad-btn" id="btn-left">◀</button>
      <div class="dpad-blank"></div>
      <button class="dpad-btn" id="btn-right">▶</button>
      <div class="dpad-blank"></div>
      <button class="dpad-btn" id="btn-down">▼</button>
      <div class="dpad-blank"></div>
    </div>

    <div class="kbd-hint">SWIPE • D-PAD • ARROW KEYS • WASD &nbsp;|&nbsp; P=PAUSE &nbsp;R=RESTART</div>

  </div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const COLS = 21, ROWS = 21;

    // Responsive cell size
    function calcCell() {
      const wrapper = document.querySelector('.wrapper');
      const w = Math.min(wrapper.clientWidth - 24, 460);
      // On tall screens give canvas more room; on short screens shrink it
      const maxH = window.innerHeight * 0.45;
      return Math.floor(Math.min(w, maxH) / COLS);
    }

    let CELL = calcCell();
    canvas.width = CELL * COLS;
    canvas.height = CELL * ROWS;

    window.addEventListener('resize', () => {
      CELL = calcCell();
      canvas.width = CELL * COLS;
      canvas.height = CELL * ROWS;
      draw();
    });

    // Game vars
    const SPEEDS = { 1: 200, 2: 120, 3: 70, 4: 35 };
    let snake, dir, nextDir, food, bonus, score, hiScore = 0;
    let gameRunning = false, paused = false, lvl, intervalId, selectedSpeed = 2, bonusTimer = 0;

    function rnd(n) { return Math.floor(Math.random() * n); }

    function init() {
      snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      food = spawnFood();
      bonus = null; bonusTimer = 0; score = 0; lvl = 1;
      updateUI();
    }

    function spawnFood() {
      let p;
      do { p = { x: rnd(COLS), y: rnd(ROWS) }; }
      while (snake.some(s => s.x === p.x && s.y === p.y));
      return p;
    }

    function spawnBonus() {
      if (bonus) return;
      let p;
      do { p = { x: rnd(COLS), y: rnd(ROWS) }; }
      while (snake.some(s => s.x === p.x && s.y === p.y) || (p.x === food.x && p.y === food.y));
      bonus = p; bonusTimer = 60;
    }

    function updateUI() {
      document.getElementById('score-val').textContent = score;
      document.getElementById('hi-val').textContent = hiScore;
      document.getElementById('len-val').textContent = snake.length;
      document.getElementById('lvl-val').textContent = lvl;
    }

    function drawGrid() {
      ctx.strokeStyle = '#0d0d15'; ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, ROWS * CELL); ctx.stroke(); }
      for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(COLS * CELL, y * CELL); ctx.stroke(); }
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
    }

    function drawSnake() {
      snake.forEach((seg, i) => {
        const isHead = i === 0, t = i / snake.length;
        const g = isHead ? 255 : Math.floor(180 - t * 80);
        const b = isHead ? 136 : Math.floor(60 - t * 40);
        ctx.fillStyle = isHead ? '#00ff88' : `rgb(0,${g},${b})`;
        const ins = isHead ? 1 : 2;
        ctx.beginPath();
        roundRect(ctx, seg.x * CELL + ins, seg.y * CELL + ins, CELL - ins * 2, CELL - ins * 2, isHead ? 5 : 3);
        ctx.fill();
        if (isHead) {
          ctx.fillStyle = '#0a0a0f';
          const eo = CELL * 0.25, ex = seg.x * CELL + CELL / 2 + dir.x * eo, ey = seg.y * CELL + CELL / 2 + dir.y * eo;
          const perp = { x: -dir.y, y: dir.x };
          ctx.beginPath(); ctx.arc(ex + perp.x * 3, ey + perp.y * 3, 2, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(ex - perp.x * 3, ey - perp.y * 3, 2, 0, Math.PI * 2); ctx.fill();
        }
      });
    }

    function drawFood() {
      const x = food.x * CELL + CELL / 2, y = food.y * CELL + CELL / 2;
      ctx.fillStyle = '#ff4466'; ctx.shadowColor = '#ff4466'; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(x, y, CELL * 0.35, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ff88aa'; ctx.beginPath(); ctx.arc(x - 2, y - 2, 2.5, 0, Math.PI * 2); ctx.fill();
    }

    function drawBonus() {
      if (!bonus) return;
      const x = bonus.x * CELL + CELL / 2, y = bonus.y * CELL + CELL / 2;
      const pulse = 0.85 + 0.15 * Math.sin(Date.now() / 120);
      ctx.fillStyle = '#ffaa00'; ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 14 * pulse;
      ctx.save(); ctx.translate(x, y); ctx.scale(pulse, pulse);
      const r = CELL * 0.4; ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = (i * 4 * Math.PI / 5) - Math.PI / 2, b2 = a + 2 * Math.PI / 10;
        if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
        else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        ctx.lineTo(Math.cos(b2) * r * 0.45, Math.sin(b2) * r * 0.45);
      }
      ctx.closePath(); ctx.fill(); ctx.restore(); ctx.shadowBlur = 0;
      ctx.fillStyle = '#ffcc44'; ctx.font = `bold ${Math.max(7, CELL * 0.4)}px Courier New`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
      ctx.fillText(Math.ceil(bonusTimer / 10), x, bonus.y * CELL);
    }

    function draw() {
      ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawGrid(); drawFood(); drawBonus(); drawSnake();
    }

    function step() {
      if (!gameRunning || paused) return;
      dir = { ...nextDir };
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { gameOver(); return; }
      if (snake.some(s => s.x === head.x && s.y === head.y)) { gameOver(); return; }
      snake.unshift(head);
      let ate = false;
      if (head.x === food.x && head.y === food.y) {
        score += 10 * lvl; ate = true; food = spawnFood();
        if (snake.length % 5 === 0) { lvl++; restartInterval(); }
        if (Math.random() < 0.3) spawnBonus();
      } else if (bonus && head.x === bonus.x && head.y === bonus.y) {
        score += 30 * lvl; ate = true; bonus = null; bonusTimer = 0;
      }
      if (!ate) snake.pop();
      if (bonus) { bonusTimer--; if (bonusTimer <= 0) bonus = null; }
      if (score > hiScore) hiScore = score;
      updateUI(); draw();
    }

    function gameOver() {
      gameRunning = false; clearInterval(intervalId); draw();
      const ol = document.getElementById('overlay');
      ol.innerHTML = `
      <div class="dead-msg">☠ GAME OVER</div>
      <div class="score-pop">SCORE: ${score} &nbsp;|&nbsp; LENGTH: ${snake.length}</div>
      ${score >= hiScore && score > 0 ? '<div style="color:#ffaa00;font-size:11px;margin-bottom:4px;letter-spacing:2px">★ NEW BEST!</div>' : ''}
      <button class="btn-start" id="start-btn">↺ PLAY AGAIN</button>`;
      ol.style.display = 'flex';
      document.getElementById('start-btn').onclick = startGame;
    }

    function restartInterval() {
      clearInterval(intervalId);
      const base = SPEEDS[selectedSpeed];
      intervalId = setInterval(step, Math.max(base - (lvl - 1) * 5, base * 0.5));
    }

    function startGame() {
      document.getElementById('overlay').style.display = 'none';
      init(); gameRunning = true; paused = false; restartInterval(); draw();
    }

    function tryDir(nd) {
      if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
    }

    // Keyboard
    const keyMap = {
      ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 },
      ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 },
      w: { x: 0, y: -1 }, s: { x: 0, y: 1 }, a: { x: -1, y: 0 }, d: { x: 1, y: 0 }
    };
    document.addEventListener('keydown', e => {
      if (keyMap[e.key]) { tryDir(keyMap[e.key]); e.preventDefault(); }
      if (e.key === 'p' || e.key === 'P') togglePause();
      if ((e.key === 'r' || e.key === 'R') && gameRunning) { clearInterval(intervalId); gameOver(); }
    });

    // D-pad
    const dpad = {
      'btn-up': { x: 0, y: -1 }, 'btn-down': { x: 0, y: 1 },
      'btn-left': { x: -1, y: 0 }, 'btn-right': { x: 1, y: 0 }
    };
    Object.entries(dpad).forEach(([id, nd]) => {
      const btn = document.getElementById(id);
      btn.addEventListener('touchstart', e => { e.preventDefault(); tryDir(nd); }, { passive: false });
      btn.addEventListener('mousedown', () => tryDir(nd));
    });

    // Swipe on canvas
    let tx = 0, ty = 0;
    canvas.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; e.preventDefault(); }, { passive: false });
    canvas.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
      if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
      Math.abs(dx) > Math.abs(dy) ? tryDir(dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 }) : tryDir(dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 });
      e.preventDefault();
    }, { passive: false });

    // Speed
    document.querySelectorAll('.spd').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.spd').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedSpeed = parseInt(btn.dataset.spd);
        if (gameRunning) restartInterval();
      };
    });

    // Pause
    function togglePause() {
      if (!gameRunning) return;
      paused = !paused;
      const pb = document.getElementById('pause-btn');
      pb.textContent = paused ? '▶ RESUME' : '⏸ PAUSE';
      pb.classList.toggle('paused', paused);
      if (!paused) draw();
    }
    document.getElementById('pause-btn').onclick = togglePause;
    document.getElementById('start-btn').onclick = startGame;

    draw();
  </script>
</body>

</html>
