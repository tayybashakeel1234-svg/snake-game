<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      font-family: 'Courier New', monospace;
      color: #e0e0e0;
      overflow: hidden;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 12px 10px 8px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 6px;
      color: #00ff88;
      text-transform: uppercase;
      text-shadow: 0 0 20px #00ff8855;
    }

    .subtitle {
      font-size: 9px;
      letter-spacing: 3px;
      color: #555;
      margin-bottom: 8px;
    }

    .stats-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 8px;
      background: #111118;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 7px 18px;
    }

    .stat { text-align: center; }
    .stat-label { font-size: 9px; letter-spacing: 2px; color: #444; }
    .stat-value { font-size: 18px; font-weight: 700; color: #00ff88; }
    #hi-score .stat-value { color: #ffaa00; }

    #canvas-wrap { position: relative; touch-action: none; }

    canvas {
      display: block;
      border: 1px solid #1a1a2e;
      border-radius: 4px;
      image-rendering: pixelated;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,15,0.92);
      border-radius: 4px;
    }

    #overlay h2 { font-size: 20px; letter-spacing: 4px; color: #00ff88; margin-bottom: 6px; }
    #overlay p { font-size: 11px; color: #555; letter-spacing: 2px; margin-bottom: 16px; text-align: center; padding: 0 16px; }

    .btn-start {
      background: transparent;
      border: 1px solid #00ff88;
      color: #00ff88;
      padding: 10px 28px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 3px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .btn-start:hover { background: #00ff8822; }

    .dead-msg { color: #ff4466; font-size: 13px; letter-spacing: 2px; margin-bottom: 6px; }
    .score-pop { color: #ffaa00; font-size: 11px; letter-spacing: 1px; margin-bottom: 14px; }

    /* D-PAD */
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 48px);
      grid-template-rows: repeat(3, 48px);
      gap: 4px;
      margin-top: 10px;
    }

    .dpad-btn {
      background: #111118;
      border: 1px solid #222;
      border-radius: 8px;
      color: #00ff88;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.1s, transform 0.1s;
      touch-action: manipulation;
    }

    .dpad-btn:active {
      background: #00ff8822;
      transform: scale(0.92);
    }

    .dpad-blank { visibility: hidden; }

    /* speed + pause row */
    .bottom-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .ctrl-label { font-size: 9px; letter-spacing: 2px; color: #444; }

    .speed-btns { display: flex; gap: 4px; }

    .spd {
      background: #111118;
      border: 1px solid #222;
      color: #555;
      padding: 5px 10px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
      touch-action: manipulation;
    }
    .spd.active { border-color: #00ff88; color: #00ff88; background: #00ff8811; }

    #pause-btn {
      background: transparent;
      border: 1px solid #333;
      color: #444;
      padding: 5px 12px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 4px;
      touch-action: manipulation;
    }
    #pause-btn.paused { border-color: #ffaa00; color: #ffaa00; }

    .kbd-hint { font-size: 9px; color: #2a2a2a; letter-spacing: 1px; margin-top: 5px; }
  </style>
</head>
<body>

  <h1>SNAKE</h1>
  <div class="subtitle">PROFESSIONAL EDITION</div>

  <div class="stats-bar">
    <div class="stat" id="cur-score">
      <div class="stat-label">SCORE</div>
      <div class="stat-value" id="score-val">0</div>
    </div>
    <div class="stat" id="hi-score">
      <div class="stat-label">BEST</div>
      <div class="stat-value" id="hi-val">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">LENGTH</div>
      <div class="stat-value" id="len-val">1</div>
    </div>
    <div class="stat">
      <div class="stat-label">LEVEL</div>
      <div class="stat-value" id="lvl-val">1</div>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="overlay">
      <h2>SNAKE</h2>
      <p>ARROWS / WASD / D-PAD<br>OR SWIPE ON SCREEN</p>
      <button class="btn-start" id="start-btn">▶ START GAME</button>
    </div>
  </div>

  <!-- D-PAD -->
  <div class="dpad">
    <div class="dpad-blank"></div>
    <button class="dpad-btn" id="btn-up">▲</button>
    <div class="dpad-blank"></div>
    <button class="dpad-btn" id="btn-left">◀</button>
    <div class="dpad-blank"></div>
    <button class="dpad-btn" id="btn-right">▶</button>
    <div class="dpad-blank"></div>
    <button class="dpad-btn" id="btn-down">▼</button>
    <div class="dpad-blank"></div>
  </div>

  <div class="bottom-row">
    <span class="ctrl-label">SPEED</span>
    <div class="speed-btns">
      <button class="spd" data-spd="1">SLOW</button>
      <button class="spd active" data-spd="2">MED</button>
      <button class="spd" data-spd="3">FAST</button>
      <button class="spd" data-spd="4">😈</button>
    </div>
    <button id="pause-btn">⏸ PAUSE</button>
  </div>

  <div class="kbd-hint">SWIPE • D-PAD • ARROW KEYS • WASD</div>

<script>
  // ── Canvas sizing: fit screen ────
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const COLS = 21, ROWS = 21;

  function sizeCanvas() {
    const maxW = Math.min(window.innerWidth - 20, 420);
    const maxH = window.innerHeight - 260; // leave room for dpad + stats
    const cell = Math.floor(Math.min(maxW, maxH) / COLS);
    canvas.width  = cell * COLS;
    canvas.height = cell * ROWS;
    return cell;
  }

  let CELL = sizeCanvas();

  // ── Game state ───
  const SPEEDS = { 1: 200, 2: 120, 3: 70, 4: 35 };
  let snake, dir, nextDir, food, bonus, score, hiScore = 0;
  let gameRunning = false, paused = false, lvl, intervalId;
  let selectedSpeed = 2, bonusTimer = 0;

  function init() {
    snake    = [{ x:10,y:10 },{ x:9,y:10 },{ x:8,y:10 }];
    dir      = { x:1, y:0 };
    nextDir  = { x:1, y:0 };
    food     = spawnFood();
    bonus    = null; bonusTimer = 0;
    score    = 0; lvl = 1;
    updateUI();
  }

  function spawnFood() {
    let p;
    do { p = { x: rnd(COLS), y: rnd(ROWS) }; }
    while (snake.some(s => s.x===p.x && s.y===p.y));
    return p;
  }

  function spawnBonus() {
    if (bonus) return;
    let p;
    do { p = { x: rnd(COLS), y: rnd(ROWS) }; }
    while (snake.some(s=>s.x===p.x&&s.y===p.y)||(p.x===food.x&&p.y===food.y));
    bonus = p; bonusTimer = 60;
  }

  function rnd(n) { return Math.floor(Math.random()*n); }

  function updateUI() {
    document.getElementById('score-val').textContent = score;
    document.getElementById('hi-val').textContent    = hiScore;
    document.getElementById('len-val').textContent   = snake.length;
    document.getElementById('lvl-val').textContent   = lvl;
  }

  // ── Draw ───
  function drawGrid() {
    ctx.strokeStyle = '#0d0d15'; ctx.lineWidth = 0.5;
    for (let x=0;x<=COLS;x++){
      ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,ROWS*CELL); ctx.stroke();
    }
    for (let y=0;y<=ROWS;y++){
      ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(COLS*CELL,y*CELL); ctx.stroke();
    }
  }

  function drawSnake() {
    snake.forEach((seg,i)=>{
      const isHead = i===0;
      const t = i/snake.length;
      const g = isHead ? 255 : Math.floor(180-t*80);
      const b2= isHead ? 136 : Math.floor(60-t*40);
      ctx.fillStyle = isHead ? '#00ff88' : `rgb(0,${g},${b2})`;
      const ins = isHead?1:2;
      ctx.beginPath();
      roundRect(ctx,seg.x*CELL+ins,seg.y*CELL+ins,CELL-ins*2,CELL-ins*2,isHead?5:3);
      ctx.fill();
      if(isHead){
        ctx.fillStyle='#0a0a0f';
        const eo=CELL*0.25, ex=seg.x*CELL+CELL/2+dir.x*eo, ey=seg.y*CELL+CELL/2+dir.y*eo;
        const perp={x:-dir.y,y:dir.x};
        ctx.beginPath(); ctx.arc(ex+perp.x*3,ey+perp.y*3,2,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex-perp.x*3,ey-perp.y*3,2,0,Math.PI*2); ctx.fill();
      }
    });
  }

  function drawFood() {
    const x=food.x*CELL+CELL/2, y=food.y*CELL+CELL/2;
    ctx.fillStyle='#ff4466'; ctx.shadowColor='#ff4466'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(x,y,CELL*0.35,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#ff88aa'; ctx.beginPath(); ctx.arc(x-2,y-2,2.5,0,Math.PI*2); ctx.fill();
  }

  function drawBonus() {
    if(!bonus) return;
    const x=bonus.x*CELL+CELL/2, y=bonus.y*CELL+CELL/2;
    const pulse=0.85+0.15*Math.sin(Date.now()/120);
    ctx.fillStyle='#ffaa00'; ctx.shadowColor='#ffaa00'; ctx.shadowBlur=14*pulse;
    ctx.save(); ctx.translate(x,y); ctx.scale(pulse,pulse);
    const r=CELL*0.4; ctx.beginPath();
    for(let i=0;i<5;i++){
      const a=(i*4*Math.PI/5)-Math.PI/2, b2=a+2*Math.PI/10;
      if(i===0) ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);
      else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
      ctx.lineTo(Math.cos(b2)*r*0.45,Math.sin(b2)*r*0.45);
    }
    ctx.closePath(); ctx.fill(); ctx.restore(); ctx.shadowBlur=0;
    ctx.fillStyle='#ffcc44'; ctx.font=`bold 8px Courier New`;
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText(Math.ceil(bonusTimer/10),x,bonus.y*CELL);
  }

  function roundRect(ctx,x,y,w,h,r){
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  }

  function draw() {
    ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,canvas.width,canvas.height);
    drawGrid(); drawFood(); drawBonus(); drawSnake();
  }

  // ── Game loop ──
  function step() {
    if(!gameRunning||paused) return;
    dir={...nextDir};
    const head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
    if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS){gameOver();return;}
    if(snake.some(s=>s.x===head.x&&s.y===head.y)){gameOver();return;}
    snake.unshift(head);
    let ate=false;
    if(head.x===food.x&&head.y===food.y){
      score+=10*lvl; ate=true; food=spawnFood();
      if(snake.length%5===0){lvl++;restartInterval();}
      if(Math.random()<0.3) spawnBonus();
    } else if(bonus&&head.x===bonus.x&&head.y===bonus.y){
      score+=30*lvl; ate=true; bonus=null; bonusTimer=0;
    }
    if(!ate) snake.pop();
    if(bonus){bonusTimer--; if(bonusTimer<=0) bonus=null;}
    if(score>hiScore) hiScore=score;
    updateUI(); draw();
  }

  function gameOver() {
    gameRunning=false; clearInterval(intervalId); draw();
    const ol=document.getElementById('overlay');
    ol.innerHTML=`
      <div class="dead-msg">☠ GAME OVER</div>
      <div class="score-pop">SCORE: ${score} &nbsp;|&nbsp; LENGTH: ${snake.length}</div>
      ${score>=hiScore&&score>0?'<div style="color:#ffaa00;font-size:11px;margin-bottom:10px;letter-spacing:2px">★ NEW BEST!</div>':''}
      <button class="btn-start" id="start-btn">↺ PLAY AGAIN</button>`;
    ol.style.display='flex';
    document.getElementById('start-btn').onclick=startGame;
  }

  function restartInterval() {
    clearInterval(intervalId);
    const base=SPEEDS[selectedSpeed];
    const adj=Math.max(base-(lvl-1)*5, base*0.5);
    intervalId=setInterval(step,adj);
  }

  function startGame() {
    document.getElementById('overlay').style.display='none';
    init(); gameRunning=true; paused=false;
    restartInterval(); draw();
  }

  // ── Direction helper ───
  function tryDir(nd) {
    if(nd.x !== -dir.x || nd.y !== -dir.y) nextDir=nd;
  }

  // ── Keyboard ──
  const keyMap = {
    ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1},
    ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
    w:{x:0,y:-1}, s:{x:0,y:1}, a:{x:-1,y:0}, d:{x:1,y:0}
  };
  document.addEventListener('keydown',e=>{
    if(keyMap[e.key]){ tryDir(keyMap[e.key]); e.preventDefault(); }
    if(e.key==='p'||e.key==='P') togglePause();
    if(e.key==='r'||e.key==='R') { if(gameRunning){clearInterval(intervalId);gameOver();} }
  });

  // ── D-PAD buttons ──
  document.getElementById('btn-up').addEventListener('touchstart',   e=>{e.preventDefault();tryDir({x:0,y:-1});},{passive:false});
  document.getElementById('btn-down').addEventListener('touchstart',  e=>{e.preventDefault();tryDir({x:0,y:1});},{passive:false});
  document.getElementById('btn-left').addEventListener('touchstart',  e=>{e.preventDefault();tryDir({x:-1,y:0});},{passive:false});
  document.getElementById('btn-right').addEventListener('touchstart', e=>{e.preventDefault();tryDir({x:1,y:0});},{passive:false});
  // also click (desktop fallback)
  document.getElementById('btn-up').onclick    = ()=>tryDir({x:0,y:-1});
  document.getElementById('btn-down').onclick  = ()=>tryDir({x:0,y:1});
  document.getElementById('btn-left').onclick  = ()=>tryDir({x:-1,y:0});
  document.getElementById('btn-right').onclick = ()=>tryDir({x:1,y:0});

  // ── Swipe on canvas ───
  let touchStartX=0, touchStartY=0;
  canvas.addEventListener('touchstart', e=>{
    touchStartX=e.touches[0].clientX;
    touchStartY=e.touches[0].clientY;
    e.preventDefault();
  },{passive:false});

  canvas.addEventListener('touchend', e=>{
    const dx=e.changedTouches[0].clientX-touchStartX;
    const dy=e.changedTouches[0].clientY-touchStartY;
    if(Math.abs(dx)<10&&Math.abs(dy)<10) return;
    if(Math.abs(dx)>Math.abs(dy))
      tryDir(dx>0?{x:1,y:0}:{x:-1,y:0});
    else
      tryDir(dy>0?{x:0,y:1}:{x:0,y:-1});
    e.preventDefault();
  },{passive:false});

  // ── Speed buttons ──
  document.querySelectorAll('.spd').forEach(btn=>{
    btn.onclick=()=>{
      document.querySelectorAll('.spd').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      selectedSpeed=parseInt(btn.dataset.spd);
      if(gameRunning) restartInterval();
    };
  });

  // ── Pause ──
  function togglePause(){
    if(!gameRunning) return;
    paused=!paused;
    const pb=document.getElementById('pause-btn');
    pb.textContent=paused?'▶ RESUME':'⏸ PAUSE';
    pb.classList.toggle('paused',paused);
    if(!paused) draw();
  }
  document.getElementById('pause-btn').onclick=togglePause;
  document.getElementById('start-btn').onclick=startGame;

  draw();
</script>
</body>
</html>
